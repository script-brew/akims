<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>AKIMS - 하드웨어 관리</title>
    <link rel="stylesheet" th:href="@{/css/common.css}" />
    <link rel="stylesheet" th:href="@{/css/layout.css}" />
    <link rel="stylesheet" th:href="@{/css/components.css}" />
    <link rel="stylesheet" th:href="@{/css/domain/hardware/hardware.css}" />
  </head>
  <body>
    <header th:replace="~{layout/header :: headerFragment}"></header>

    <div class="app-body">
      <aside th:replace="~{layout/sidebar :: sidebarFragment}"></aside>

      <main class="app-main">
        <div class="content-header">
          <h2>물리 하드웨어(Hardware) 관리</h2>
          <div class="header-actions">
            <button id="btn-open-modal" class="btn">새 하드웨어 입고</button>
            <button id="btn-edit" class="btn" style="background-color: #f39c12">
              선택 수정
            </button>
            <button id="btn-delete" class="btn danger">선택 삭제</button>
          </div>
        </div>

        <table class="data-table">
          <thead>
            <tr>
              <th width="4%">
                <input type="checkbox" id="check-all" class="data-checkbox" />
              </th>
              <th width="10%">위치 정보</th>
              <th width="15%">실장 위치</th>
              <th width="10%">장비 구분</th>
              <th width="10%">도입년도</th>
              <th width="15%">모델명</th>
              <th width="10%">시리얼 번호</th>
              <th width="20%">이름</th>
              <th width="10%">전원 상태</th>
            </tr>
          </thead>
          <tbody id="hardware-table-body">
            <tr>
              <td colspan="8" style="text-align: center">
                데이터를 불러오는 중입니다...
              </td>
            </tr>
          </tbody>
        </table>
      </main>
    </div>

    <footer th:replace="~{layout/footer :: footerFragment}"></footer>

    <div id="hw-modal" class="modal-overlay">
      <div class="modal-content">
        <h3 id="modal-title">하드웨어 장비 입고</h3>

        <input type="hidden" id="hw-id" />
        <div class="form-row">
          <div class="form-group">
            <label for="hw-equipment-type">장비 구분 *</label>
            <select id="hw-equipment-type">
              <option value="SERVER">서버 (Server)</option>
              <option value="SWITCH">스위치 (Switch)</option>
              <option value="ROUTER">라우터 (Router)</option>
              <option value="SAN">SAN스위치 (SAN)</option>
              <option value="STORAGE">스토리지 (Storage)</option>
              <option value="FIREWALL">방화벽 (Firewall)</option>
              <option value="ETC">기타</option>
            </select>
          </div>
          <div class="form-group">
            <label for="hw-serial">시리얼 넘버 (S/N) *</label>
            <input type="text" id="hw-serial" placeholder="예: DSN123456" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="hw-model">모델명 *</label>
            <input
              type="text"
              id="hw-model"
              placeholder="예: Dell PowerEdge R740"
            />
          </div>
          <div class="form-group">
            <label for="hw-year">도입년도 *</label>
            <input type="number" id="hw-year" value="2024" min="1990" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="hw-size">크기 (U) *</label>
            <input type="number" id="hw-size" value="1" min="1" />
          </div>
          <div class="form-group">
            <label style="margin: 0">전원 이중화 여부</label>
            <label
              for="hw-single-power"
              style="
                display: inline-flex;
                flex-direction: row;
                align-items: center;
                gap: 6px;
                margin: 0;
                font-weight: normal;
                cursor: pointer;
              "
            >
              <input
                type="checkbox"
                id="hw-single-power"
                class="data-checkbox"
                style="margin: 0; width: 16px; height: 16px; cursor: pointer"
              />
              <span style="padding-top: 2px"
                >단일 전원 (Single Power) 장비</span
              >
            </label>
          </div>
        </div>

        <div class="form-row">
          <div
            class="form-group"
            id="hw-power-line-group"
            style="display: none"
          >
            <label>단일 전원 연결선 (PDU) *</label>
            <select id="hw-power-line">
              <option value="A">POWER A (좌측 PDU)</option>
              <option value="B">POWER B (우측 PDU)</option>
            </select>
          </div>
        </div>

        <hr
          style="
            border: 0;
            border-top: 1px solid var(--border-color);
            margin-bottom: 15px;
          "
        />

        <div class="form-row">
          <div class="form-group">
            <label for="hw-rack">실장할 랙 (Rack)</label>
            <select id="hw-rack">
              <option value="">-- 미실장 (창고 보관) --</option>
            </select>
          </div>
          <div class="form-group">
            <label for="hw-position">랙 시작 위치 (U)</label>
            <input
              type="number"
              id="hw-position"
              placeholder="예: 10 (10U 위치에 장착)"
            />
          </div>
        </div>

        <div class="form-group full">
          <label for="hw-desc">비고 / 설명</label>
          <input type="text" id="hw-desc" placeholder="장비에 대한 추가 설명" />
        </div>

        <div class="modal-actions">
          <button id="btn-cancel" class="btn cancel">취소</button>
          <button id="btn-save" class="btn">저장</button>
        </div>
      </div>
    </div>

    <script type="module" th:src="@{/js/hardware/hardware.js}"></script>
  </body>
</html>
