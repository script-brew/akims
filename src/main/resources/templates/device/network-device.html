<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>AKIMS - 네트워크 장비 관리</title>
    <link rel="stylesheet" th:href="@{/css/common.css}" />
    <link rel="stylesheet" th:href="@{/css/layout.css}" />
    <link rel="stylesheet" th:href="@{/css/components.css}" />
    <link rel="stylesheet" th:href="@{/css/domain/device/network-device.css}" />
    <link th:href="@{/css/lib/mermaid.min.css}" rel="stylesheet" />
    <script th:src="@{/js/lib/gridjs.umd.js}"></script>
  </head>
  <body>
    <header th:replace="~{layout/header :: headerFragment}"></header>

    <div class="app-body">
      <aside th:replace="~{layout/sidebar :: sidebarFragment}"></aside>

      <main class="app-main">
        <div class="content-header">
          <h2>논리 네트워크 장비 관리</h2>
          <div class="header-actions">
            <input
              type="file"
              id="excel-file-input"
              accept=".xlsx, .xls"
              style="display: none"
            />
            <button
              id="btn-upload-excel"
              class="btn"
              style="background-color: #27ae60"
            >
              ⬆️ 엑셀 업로드
            </button>
            <button
              id="btn-download-excel"
              class="btn"
              style="background-color: #2980b9"
            >
              ⬇️ 엑셀 다운로드
            </button>

            <button id="btn-open-modal" class="btn">
              새 네트워크 장비 등록
            </button>
            <button id="btn-edit" class="btn" style="background-color: #f39c12">
              선택 수정
            </button>
            <button id="btn-delete" class="btn danger">선택 삭제</button>
          </div>
        </div>

        <div
          id="network-search-filter"
          th:insert="~{components/search-filter :: searchFilterFragment}"
        ></div>

        <div id="network-device-grid-container" style="margin-top: 20px"></div>

        <div
          id="network-pagination"
          th:insert="~{components/pagination :: paginationFragment}"
        ></div>
      </main>
    </div>

    <footer th:replace="~{layout/footer :: footerFragment}"></footer>

    <div id="nd-modal" class="modal-overlay">
      <div class="modal-content" style="width: 550px">
        <h3 id="modal-title">네트워크 장비 등록</h3>
        <input type="hidden" id="nd-id" />

        <div class="form-row">
          <div class="form-group">
            <label for="nd-category">장비 구분 *</label>
            <select id="nd-category">
              <option value="L2_SWITCH">L2 스위치</option>
              <option value="L3_SWITCH">L3 스위치</option>
              <option value="ROUTER">라우터</option>
              <option value="FIREWALL">방화벽 (Firewall)</option>
              <option value="L4_SWITCH">L4 스위치 (LB)</option>
              <option value="L7_SWITCH">L7 스위치</option>
              <option value="VPN">VPN 장비</option>
              <option value="ETC">기타</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="nd-name">장비명 (Device Name) *</label>
            <input type="text" id="nd-name" placeholder="예: ak-prd-fw01" />
          </div>
          <div class="form-group">
            <label for="nd-os">운영체제(OS) *</label>
            <input
              type="text"
              id="nd-os"
              placeholder="예: Cisco IOS 15.7.9, JunOS"
            />
          </div>
        </div>

        <hr
          style="
            border: 0;
            border-top: 1px solid var(--border-color);
            margin-bottom: 15px;
          "
        />

        <div class="form-row">
          <div class="form-group full">
            <div
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 5px;
              "
            >
              <label style="margin: 0">할당 IP 목록</label>
              <button
                type="button"
                id="btn-add-ip"
                class="btn small"
                style="background-color: #2ecc71"
              >
                + IP 추가
              </button>
            </div>
            <div
              id="ip-list-container"
              style="
                display: flex;
                flex-direction: column;
                gap: 10px;
                background: #f8f9fa;
                padding: 10px;
                border-radius: 4px;
                border: 1px solid var(--border-color);
              "
            ></div>
          </div>
        </div>

        <div class="form-group full">
          <label for="nd-hardware">물리 장비 (Hardware) 매핑</label>
          <select id="nd-hardware">
            <option value="">-- 매핑 안 함 (또는 알 수 없음) --</option>
          </select>
          <small style="color: #7f8c8d"
            >※ 이 논리 장비가 구동되는 실제 물리 스위치/방화벽 하드웨어를
            선택하세요.</small
          >
        </div>

        <div class="form-group full">
          <label for="nd-desc">설명 / 용도</label>
          <input
            type="text"
            id="nd-desc"
            placeholder="예: 외부망 연동 방화벽 (Active)"
          />
        </div>

        <div class="modal-actions">
          <button id="btn-cancel" class="btn cancel">취소</button>
          <button id="btn-save" class="btn">저장</button>
        </div>
      </div>
    </div>

    <script type="module" th:src="@{/js/device/network-device.js}"></script>
  </body>
</html>
