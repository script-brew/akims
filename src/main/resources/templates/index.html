<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>AKIMS - 인프라 종합 대시보드</title>
    <link rel="stylesheet" th:href="@{/css/common.css}" />
    <link rel="stylesheet" th:href="@{/css/layout.css}" />
    <link rel="stylesheet" th:href="@{/css/components.css}" />
    <link rel="stylesheet" th:href="@{/css/domain/dashboard/index.css}" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <header th:replace="~{layout/header :: headerFragment}"></header>

    <div class="app-body">
      <aside th:replace="~{layout/sidebar :: sidebarFragment}"></aside>

      <main class="app-main" style="background-color: #f4f6f9">
        <div class="content-header">
          <h2>인프라 종합 대시보드</h2>
          <div class="header-actions">
            <button
              class="btn"
              onclick="location.reload()"
              style="background-color: #34495e"
            >
              🔄 새로고침
            </button>
          </div>
        </div>

        <div class="summary-cards">
          <div class="card">
            <h3>총 관리 서버 (Server)</h3>
            <div class="value" id="tot-server">0</div>
          </div>
          <div class="card">
            <h3>네트워크 장비 (Network Eq)</h3>
            <div class="value" id="tot-network">0</div>
          </div>
          <div class="card">
            <h3>운영 장소 (Location)</h3>
            <div class="value" id="tot-location">0</div>
          </div>
          <div class="card">
            <h3>할당된 총 랙 (Rack)</h3>
            <div class="value" id="tot-rack">0</div>
          </div>
        </div>

        <div class="charts-area">
          <div class="chart-container">
            <h3
              style="
                text-align: center;
                color: #2c3e50;
                margin-bottom: 20px;
                font-size: 1.2rem;
              "
            >
              서버 운영 환경 분포
            </h3>
            <canvas id="envChart"></canvas>
          </div>
          <div class="chart-container">
            <h3
              style="
                text-align: center;
                color: #2c3e50;
                margin-bottom: 20px;
                font-size: 1.2rem;
              "
            >
              운영체제(OS) 실장 현황
            </h3>
            <canvas id="osChart"></canvas>
          </div>
        </div>
      </main>
    </div>

    <footer th:replace="~{layout/footer :: footerFragment}"></footer>
    <script type="module" th:src="@{/js/dashboard/index.js}"></script>
  </body>
</html>
