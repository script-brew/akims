<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>AKIMS - 장소 관리</title>
    <link rel="stylesheet" th:href="@{/css/common.css}" />
    <link rel="stylesheet" th:href="@{/css/layout.css}" />
    <link rel="stylesheet" th:href="@{/css/domain/space/location.css}" />
  </head>
  <body>
    <header th:replace="~{layout/header :: headerFragment}"></header>

    <div class="app-body">
      <aside th:replace="~{layout/sidebar :: sidebarFragment}"></aside>

      <main class="app-main">
        <div class="content-header">
          <h2>장소(Location) 관리</h2>
          <button id="btn-open-modal" class="btn">새 장소 등록</button>
        </div>

        <table class="data-table">
          <thead>
            <tr>
              <th width="10%">ID</th>
              <th width="60%">장소명</th>
              <th width="30%">관리</th>
            </tr>
          </thead>
          <tbody id="location-table-body">
            <tr>
              <td colspan="3" style="text-align: center">
                데이터를 불러오는 중입니다...
              </td>
            </tr>
          </tbody>
        </table>
      </main>
    </div>

    <footer th:replace="~{layout/footer :: footerFragment}"></footer>

    <div id="location-modal" class="modal-overlay">
      <div class="modal-content">
        <h3 id="modal-title">장소 등록</h3>
        <div class="form-group">
          <label for="location-name">장소명</label>
          <input
            type="text"
            id="location-name"
            placeholder="예: 상암 데이터센터"
          />
          <input type="hidden" id="location-id" />
        </div>
        <div class="modal-actions">
          <button id="btn-cancel" class="btn" style="background-color: #95a5a6">
            취소
          </button>
          <button id="btn-save" class="btn">저장</button>
        </div>
      </div>
    </div>

    <script type="module" th:src="@{/js/space/location.js}"></script>
  </body>
</html>
