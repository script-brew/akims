<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <header th:fragment="headerFragment" class="app-header">
    <div class="logo">
      <a
        th:href="@{/}"
        style="
          text-decoration: none;
          color: inherit;
          display: block;
          cursor: pointer;
        "
      >
        <img th:src="@{/images/icon.jpg}" alt="AKIMS Logo" class="logo-img" />
        <span class="logo-text">AKIMS <small>자산 관리 솔루션</small></span>
      </a>
    </div>
    <div class="user-profile">
      <span class="user-name">관리자 님</span>
      <button class="btn-logout">로그아웃</button>
    </div>
  </header>
</html>
