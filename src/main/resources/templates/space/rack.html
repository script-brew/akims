<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>AKIMS - 랙(Rack) 관리</title>
    <link rel="stylesheet" th:href="@{/css/common.css}" />
    <link rel="stylesheet" th:href="@{/css/layout.css}" />
    <link rel="stylesheet" th:href="@{/css/components.css}" />
    <link rel="stylesheet" th:href="@{/css/domain/space/rack.css}" />
  </head>
  <body>
    <header th:replace="~{layout/header :: headerFragment}"></header>

    <div class="app-body">
      <aside th:replace="~{layout/sidebar :: sidebarFragment}"></aside>

      <main class="app-main">
        <div class="content-header">
          <h2>랙(Rack) 관리</h2>
          <div class="header-actions">
            <button id="btn-open-modal" class="btn">새 랙 등록</button>
            <button id="btn-edit" class="btn" style="background-color: #f39c12">
              선택 수정
            </button>
            <button id="btn-delete" class="btn danger">선택 삭제</button>
          </div>
        </div>

        <table class="data-table">
          <thead>
            <tr>
              <th width="5%">
                <input type="checkbox" id="check-all" class="data-checkbox" />
              </th>
              <th width="15%">상위 장소 (Location)</th>
              <th width="20%">랙 번호 (Rack No)</th>
              <th width="20%">랙 이름 (Name)</th>
              <th width="10%">높이 (U)</th>
              <th width="15%">실장 장비 수</th>
              <th width="15%">상세 관리</th>
            </tr>
          </thead>
          <tbody id="rack-table-body">
            <tr>
              <td colspan="7" style="text-align: center">
                데이터를 불러오는 중입니다...
              </td>
            </tr>
          </tbody>
        </table>

        <div
          id="visual-rack-container"
          style="
            display: none;
            margin-top: 30px;
            padding: 20px;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
          "
        >
          <div
            class="content-header"
            style="
              margin-bottom: 20px;
              border-bottom: 2px solid var(--border-color);
              padding-bottom: 10px;
            "
          >
            <h3 id="visual-rack-title" style="color: var(--primary-color)">
              랙 시각화
            </h3>
            <button id="btn-close-visual" class="btn cancel small">닫기</button>
          </div>
          <div
            id="rack-grid-area"
            class="rack-grid"
            style="justify-content: center"
          ></div>
        </div>
      </main>
    </div>

    <footer th:replace="~{layout/footer :: footerFragment}"></footer>

    <div id="rack-modal" class="modal-overlay">
      <div class="modal-content">
        <h3 id="modal-title">랙 등록</h3>

        <div class="form-group">
          <label for="rack-location">소속 장소 (Location)</label>
          <select id="rack-location"></select>
        </div>
        <div class="form-group">
          <label for="rack-no">랙 번호 (예: A-01)</label>
          <input type="text" id="rack-no" />
        </div>
        <div class="form-group">
          <label for="rack-name">랙 이름 (예: 네트워크 랙)</label>
          <input type="text" id="rack-name" />
        </div>
        <div class="form-group">
          <label for="rack-size">크기 (U 단위, 기본 42U)</label>
          <input type="number" id="rack-size" value="42" min="1" max="60" />
        </div>

        <div class="modal-actions">
          <button id="btn-cancel" class="btn" style="background-color: #95a5a6">
            취소
          </button>
          <button id="btn-save" class="btn">저장</button>
        </div>
      </div>
    </div>

    <script type="module" th:src="@{/js/space/rack.js}"></script>
  </body>
</html>
