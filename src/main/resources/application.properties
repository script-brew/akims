spring.application.name=infra

# ==========================================
# 1. H2 Database Configuration (Local/Test)
# ==========================================
spring.datasource.url=jdbc:h2:file:./data/akims;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console 활성화 (접속 주소: http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# 2. JPA & Hibernate Configuration (Hibernate 7)
# ==========================================
# 엔티티 기반으로 앱 시작 시 테이블 자동 생성, 종료 시 삭제
spring.jpa.hibernate.ddl-auto=update
# 실행되는 SQL 쿼리를 콘솔에 출력
spring.jpa.show-sql=true
# 출력되는 SQL을 보기 좋게 멀티라인 정렬
spring.jpa.properties.hibernate.format_sql=true
# SQL 쿼리 내에 왜 이 쿼리가 실행되었는지 주석 표시
spring.jpa.properties.hibernate.use_sql_comments=true

# ==========================================
# 3. Logging Level Configuration (단계별 로깅)
# ==========================================
# Hibernate가 실행하는 SQL 쿼리 로깅
logging.level.org.hibernate.SQL=DEBUG
# SQL 쿼리에 바인딩되는 실제 파라미터 값(?, ?) 추적
logging.level.org.hibernate.orm.jdbc.bind=TRACE
# 🌟 우리의 핵심 도메인 패키지 로그 레벨 설정
logging.level.com.akplaza.infra=DEBUG

# ==========================================
# 4. Logging Pattern Configuration
# ==========================================
# 로그 출력 포맷 정의: [%X{traceId}]를 추가하여 MDC에 넣은 고유 ID를 출력합니다.
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr([%15.15t]){faint} %clr([%X{traceId}]){blue} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n

# ==========================================
# 3. 기타 추천 설정 (개발 편의성)
# ==========================================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console